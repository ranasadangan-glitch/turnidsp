<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TurniDSP — People</title>
<!--
  employees.html is no longer a standalone page.
  Its full functionality (search, filters, profile drawer with tabs for
  overview/schedule/absences/documents/disciplinary) now lives in the
  People section inside app.html. Any #ID deep link (e.g. employees.html#123)
  is preserved and translated to app.html's #employees/ID route, which opens
  the same profile directly.
-->
<script>
  var id = location.hash.replace('#', '');
  var target = 'app.html#employees' + (id ? '/' + id : '');
  location.replace(target);
</script>
</head>
<body>
<p>Reindirizzamento a People… Se non vieni reindirizzato automaticamente, <a href="app.html#employees">clicca qui</a>.</p>
</body>
</html>
