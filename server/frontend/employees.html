<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dipendenti — Gestione Turni</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="design.css">
<style>
.emp-list { display:flex; flex-direction:column; gap:0; }
.emp-row {
  display:flex; align-items:center; gap:12px; padding:12px 16px;
  border-bottom:1px solid var(--line); cursor:pointer; transition:background .12s;
}
.emp-row:hover { background:var(--bg2); }
.emp-row.selected { background:var(--pri-bg); }
.emp-avatar {
  width:40px; height:40px; border-radius:12px; flex-shrink:0;
  background:var(--pri); color:#fff;
  display:flex; align-items:center; justify-content:center;
  font-weight:800; font-size:.9rem; letter-spacing:-.02em;
}
.emp-avatar.inactive { background:var(--muted); opacity:.6; }
.emp-name { font-weight:600; font-size:.9rem; }
.emp-meta { font-size:.75rem; color:var(--muted); }

/* Profile panel */
.profile-panel { flex:1; overflow-y:auto; }
.profile-hero {
  background:linear-gradient(135deg, var(--pri) 0%, #1D4ED8 100%);
  padding:28px 28px 20px; color:#fff;
  display:flex; align-items:flex-end; gap:18px;
}
.profile-avatar {
  width:72px; height:72px; border-radius:18px;
  background:rgba(255,255,255,.22); border:3px solid rgba(255,255,255,.5);
  display:flex; align-items:center; justify-content:center;
  font-size:1.8rem; font-weight:800; flex-shrink:0;
}
.profile-hero h1 { font-size:1.4rem; font-weight:800; margin-bottom:4px; }
.profile-hero p { font-size:.85rem; opacity:.85; }
.profile-tabs {
  display:flex; gap:0; border-bottom:1.5px solid var(--line);
  background:var(--card); padding:0 20px; overflow-x:auto;
}
.profile-tab {
  padding:12px 16px; font-size:.85rem; font-weight:600; color:var(--muted);
  border-bottom:2.5px solid transparent; cursor:pointer; white-space:nowrap;
  background:none; border-top:0; border-left:0; border-right:0;
  transition:color .12s;
}
.profile-tab.on { color:var(--pri); border-bottom-color:var(--pri); }
.tab-content { display:none; padding:20px; }
.tab-content.on { display:block; }
.info-grid {
  display:grid; grid-template-columns:repeat(auto-fill, minmax(200px,1fr));
  gap:14px; margin-bottom:20px;
}
.info-item { display:flex; flex-direction:column; gap:2px; }
.info-item label { font-size:.7rem; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; }
.info-item span { font-size:.9rem; font-weight:500; }
.timeline-item {
  display:flex; gap:12px; padding:10px 0; border-bottom:1px solid var(--line);
}
.timeline-item:last-child { border-bottom:0; }
.timeline-dot {
  width:8px; height:8px; border-radius:50%; background:var(--pri);
  margin-top:6px; flex-shrink:0;
}
.absence-chip {
  display:inline-flex; align-items:center; gap:5px;
  padding:3px 10px; border-radius:20px; font-size:.75rem; font-weight:700;
}
.shift-mini {
  display:inline-flex; align-items:center; justify-content:center;
  width:44px; height:28px; border-radius:7px; font-size:.72rem; font-weight:800;
}

/* List/profile split layout */
.emp-layout { display:flex; height:calc(100vh - 60px); overflow:hidden; }
.emp-sidebar {
  width:300px; flex-shrink:0; border-right:1px solid var(--line);
  display:flex; flex-direction:column; overflow:hidden;
}
.emp-sidebar-head {
  padding:12px 14px; border-bottom:1px solid var(--line);
  display:flex; flex-direction:column; gap:8px;
}
.emp-sidebar-search {
  display:flex; align-items:center; gap:8px;
  padding:8px 12px; border:1.5px solid var(--line2); border-radius:9px;
  background:var(--bg2);
}
.emp-sidebar-search input {
  flex:1; border:0; background:none; font-size:.875rem; outline:none;
  color:var(--ink);
}
.emp-sidebar-body { flex:1; overflow-y:auto; }
.emp-no-selection {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:10px;
  color:var(--muted); padding:40px;
}
@media(max-width:700px) {
  .emp-sidebar { width:100%; border-right:0; }
  .profile-panel { display:none; }
  .emp-sidebar.has-profile + .profile-panel { display:block; position:fixed; inset:60px 0 0 0; z-index:100; background:var(--bg); }
}
</style>
</head>
<body>

<header class="app-header">
  <div class="app-logo">🚚 Gestione Turni <small>Dipendenti</small></div>
  <div class="header-spacer"></div>
  <a class="btn btn-ghost btn-sm" href="dashboard.html" style="text-decoration:none">📊 Dashboard</a>
  <a class="btn btn-ghost btn-sm" href="index.html" style="text-decoration:none">🗓 Scheduler</a>
  <button class="btn btn-ghost btn-sm" onclick="doLogout()">Esci</button>
</header>

<div class="emp-layout">

  <!-- Employee list sidebar -->
  <aside class="emp-sidebar" id="empSidebar">
    <div class="emp-sidebar-head">
      <div class="emp-sidebar-search">
        <span>🔍</span>
        <input id="empSearch" placeholder="Cerca dipendente…" oninput="filterEmployees(this.value)" autocomplete="off">
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <select id="empBranchFilter" class="input" style="flex:1;font-size:.8rem;padding:5px 8px" onchange="filterEmployees()">
          <option value="">Tutte le filiali</option>
        </select>
        <select id="empStatusFilter" class="input" style="flex:1;font-size:.8rem;padding:5px 8px" onchange="filterEmployees()">
          <option value="">Tutti</option>
          <option value="active">Attivi</option>
          <option value="inactive">Inattivi</option>
        </select>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span id="empCount" class="text-sm text-muted">—</span>
        <button class="btn btn-primary btn-sm" onclick="openNewEmployee()">+ Nuovo</button>
      </div>
    </div>
    <div class="emp-sidebar-body emp-list" id="empList">
      <div style="padding:20px;text-align:center" class="text-muted text-sm skeleton" style="height:40px;border-radius:8px;margin:8px"></div>
    </div>
  </aside>

  <!-- Profile panel -->
  <div class="profile-panel" id="profilePanel">
    <div class="emp-no-selection" id="noSelection">
      <div style="font-size:3rem">👥</div>
      <h3>Seleziona un dipendente</h3>
      <p class="text-sm">Clicca sulla lista a sinistra per vedere il profilo completo</p>
    </div>
    <div id="profileContent" style="display:none"></div>
  </div>

</div>

<script src="api.js"></script>
<script>
if (!(TurniApi.isLoggedIn() && TurniApi.user())) { location.replace('login.html'); }
TurniApi.startIdleTimeout(30, () => location.replace('login.html'));
const user = TurniApi.user();

function doLogout() { TurniApi.logout().catch(()=>{}); location.replace('login.html'); }

let _employees = [], _selectedId = null;

// ── Helpers ───────────────────────────────────────────────────
function fmt(d) { return d ? new Date(d).toLocaleDateString('it-IT') : '—'; }
function fmtTs(d) { return d ? new Date(d).toLocaleString('it-IT',{dateStyle:'short',timeStyle:'short'}) : '—'; }
function esc(s) { return String(s??'').replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function initials(r) { return ((r.last_name||'')[0]||(r.first_name||'')[0]||'?').toUpperCase() + ((r.first_name||'')[0]||'').toUpperCase(); }
function contractStatus(r) {
  if (!r.contract_end_date) return { cls:'badge-muted', label:'Indeterminato' };
  const days = Math.ceil((new Date(r.contract_end_date)-new Date())/86400000);
  if (days < 0) return { cls:'badge-bad', label:'Scaduto' };
  if (days <= 7) return { cls:'badge-bad', label:days+'gg' };
  if (days <= 30) return { cls:'badge-warn', label:days+'gg' };
  return { cls:'badge-ok', label:fmt(r.contract_end_date) };
}

// ── Boot ─────────────────────────────────────────────────────
async function boot() {
  try {
    const branches = await TurniApi.branches();
    const sel = document.getElementById('empBranchFilter');
    branches.forEach(b => { const o=document.createElement('option'); o.value=b.code; o.textContent=b.code; sel.appendChild(o); });
  } catch {}
  await loadEmployees();
  // Open profile from hash
  if (location.hash) {
    const id = +location.hash.replace('#','');
    if (id) openProfile(id);
  }
}

async function loadEmployees() {
  try {
    const data = await TurniApi.employees({ pageSize: 500 });
    _employees = data.rows || data;
    filterEmployees();
  } catch (e) {
    document.getElementById('empList').innerHTML = `<div style="padding:16px;color:var(--bad)">${esc(e.message)}</div>`;
  }
}

function filterEmployees(q) {
  if (q === undefined) q = document.getElementById('empSearch').value;
  const branch = document.getElementById('empBranchFilter').value;
  const status = document.getElementById('empStatusFilter').value;
  q = (q||'').toLowerCase();

  let rows = _employees;
  if (branch) rows = rows.filter(r => r.branch_code === branch);
  if (status) rows = rows.filter(r => r.status === status);
  if (q) rows = rows.filter(r =>
    (r.last_name+' '+r.first_name).toLowerCase().includes(q) ||
    (r.transporter_id||'').toLowerCase().includes(q) ||
    (r.employee_code||'').toLowerCase().includes(q)
  );

  document.getElementById('empCount').textContent = rows.length + ' dipendenti';
  const list = document.getElementById('empList');
  if (!rows.length) { list.innerHTML = '<div style="padding:20px;text-align:center" class="text-muted text-sm">Nessun risultato</div>'; return; }

  list.innerHTML = rows.map(r => {
    const cs = contractStatus(r);
    return `<div class="emp-row${r.id===_selectedId?' selected':''}" onclick="openProfile(${r.id})">
      <div class="emp-avatar${r.status==='inactive'?' inactive':''}">${esc(initials(r))}</div>
      <div style="flex:1;min-width:0">
        <div class="emp-name">${esc(r.last_name)} ${esc(r.first_name)}</div>
        <div class="emp-meta">${esc(r.branch_code||'—')} · ${esc(r.service_name||'—')}</div>
      </div>
      <span class="badge ${cs.cls}" style="font-size:.65rem">${cs.label}</span>
    </div>`;
  }).join('');
}

// ── Profile ──────────────────────────────────────────────────
async function openProfile(id) {
  _selectedId = id;
  location.hash = '#' + id;
  filterEmployees(); // update selected state

  const panel = document.getElementById('profileContent');
  const noSel = document.getElementById('noSelection');
  noSel.style.display = 'none';
  panel.style.display = 'block';
  panel.innerHTML = `<div style="padding:40px;text-align:center" class="text-muted">Caricamento…</div>`;

  document.getElementById('empSidebar').classList.add('has-profile');

  try {
    const emp = await TurniApi.employeeProfile(id);
    renderProfile(emp);
  } catch (e) {
    panel.innerHTML = `<div style="padding:20px;color:var(--bad)">Errore: ${esc(e.message)}</div>`;
  }
}

function renderProfile(emp) {
  const cs = contractStatus(emp);
  const panel = document.getElementById('profileContent');

  panel.innerHTML = `
    <div class="profile-hero">
      <div class="profile-avatar">${esc(initials(emp))}</div>
      <div>
        <h1>${esc(emp.last_name)} ${esc(emp.first_name)}</h1>
        <p>${esc(emp.branch_name||emp.branch_code||'—')} · ${esc(emp.service_type_name||'—')} · ${esc(emp.contract_label||'—')}</p>
        <div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap">
          <span class="badge ${emp.status==='active'?'badge-ok':'badge-muted'}">${emp.status==='active'?'Attivo':'Inattivo'}</span>
          <span class="badge ${cs.cls}">${cs.label}</span>
          ${emp.open_disciplinary > 0 ? `<span class="badge badge-bad">⚠ ${emp.open_disciplinary} disciplinare</span>` : ''}
          ${emp.absences_today > 0 ? `<span class="badge badge-warn">Assente oggi</span>` : ''}
        </div>
      </div>
    </div>

    <div class="profile-tabs">
      <button class="profile-tab on" onclick="switchTab('overview')">Panoramica</button>
      <button class="profile-tab" onclick="switchTab('schedule')">Turni recenti</button>
      <button class="profile-tab" onclick="switchTab('absences')">Assenze (${(emp.absences||[]).length})</button>
      <button class="profile-tab" onclick="switchTab('documents')">Documenti (${(emp.documents||[]).length})</button>
      ${emp.open_disciplinary > 0 ? '<button class="profile-tab" onclick="switchTab(\'disciplinary\')">Disciplinare</button>' : ''}
    </div>

    <div id="tab-overview" class="tab-content on">
      <div class="info-grid">
        <div class="info-item"><label>Codice dipendente</label><span>${esc(emp.employee_code||'—')}</span></div>
        <div class="info-item"><label>Transporter ID</label><span>${esc(emp.transporter_id||'—')}</span></div>
        <div class="info-item"><label>Email</label><span>${emp.email?`<a href="mailto:${esc(emp.email)}">${esc(emp.email)}</a>`:'—'}</span></div>
        <div class="info-item"><label>Telefono</label><span>${esc(emp.phone||'—')}</span></div>
        <div class="info-item"><label>Filiale</label><span>${esc(emp.branch_name||emp.branch_code||'—')}</span></div>
        <div class="info-item"><label>Team</label><span>${esc(emp.team_name||'—')}</span></div>
        <div class="info-item"><label>Servizio</label><span>${esc(emp.service_type_name||'—')}</span></div>
        <div class="info-item"><label>Contratto</label><span>${esc(emp.contract_label||'—')}</span></div>
        <div class="info-item"><label>Ore/settimana</label><span>${emp.weekly_hours||'—'}</span></div>
        <div class="info-item"><label>Data assunzione</label><span>${fmt(emp.hire_date)}</span></div>
        <div class="info-item"><label>Inizio contratto</label><span>${fmt(emp.contract_start_date)}</span></div>
        <div class="info-item"><label>Fine contratto</label><span class="${cs.cls}">${fmt(emp.contract_end_date)||'Indeterminato'}</span></div>
        ${emp.tenure_months ? `<div class="info-item"><label>Anzianità</label><span>${Math.floor(emp.tenure_months/12)} anni ${emp.tenure_months%12} mesi</span></div>` : ''}
        <div class="info-item"><label>Codice turno default</label><span>${esc(emp.default_shift_code||'—')}</span></div>
        ${emp.nationality ? `<div class="info-item"><label>Nazionalità</label><span>${esc(emp.nationality)}</span></div>` : ''}
        ${emp.tax_code ? `<div class="info-item"><label>Codice fiscale</label><span>${esc(emp.tax_code)}</span></div>` : ''}
      </div>
      ${(emp.emergency_name||emp.emergency_phone) ? `
        <div class="card card-pad" style="margin-bottom:14px">
          <div class="section-title text-sm mb-2">🆘 Contatto emergenza</div>
          <div>${esc(emp.emergency_name||'—')} · ${esc(emp.emergency_phone||'—')}</div>
        </div>` : ''}
      ${emp.notes ? `<div class="card card-pad"><div class="section-title text-sm mb-2">📝 Note</div><div class="text-sm">${esc(emp.notes)}</div></div>` : ''}
      <div style="display:flex;gap:8px;margin-top:16px;flex-wrap:wrap">
        ${user.role==='admin'||user.role==='hr_manager'?`<button class="btn btn-primary btn-sm" onclick="editEmployee(${emp.id})">✏️ Modifica</button>`:''}
        ${user.role==='admin'?`<button class="btn btn-ghost btn-sm" onclick="toggleStatus(${emp.id},'${emp.status==='active'?'inactive':'active'}')">${emp.status==='active'?'Disattiva':'Attiva'}</button>`:''}
      </div>
    </div>

    <div id="tab-schedule" class="tab-content">
      <div class="text-sm text-muted mb-2">Ultimi 60 giorni di turni</div>
      <div style="display:flex;flex-wrap:wrap;gap:5px">
        ${(emp.recent_schedules||[]).map(s=>{
          const d=new Date(s.work_date);
          const dateStr=d.toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit'});
          return `<div title="${dateStr}: ${esc(s.shift_code)}" style="text-align:center">
            <div class="text-xs text-muted" style="margin-bottom:2px">${dateStr}</div>
            <div class="shift-mini" style="background:var(--pri-bg);color:var(--pri)">${esc(s.shift_code)}</div>
          </div>`;
        }).join('')||'<div class="text-muted text-sm">Nessun turno registrato</div>'}
      </div>
    </div>

    <div id="tab-absences" class="tab-content">
      ${(emp.absences||[]).length === 0 ? '<div class="text-muted text-sm">Nessuna assenza registrata</div>' :
        (emp.absences||[]).map(a=>`
          <div class="timeline-item">
            <div class="timeline-dot" style="background:var(--warn)"></div>
            <div style="flex:1">
              <div style="display:flex;align-items:center;gap:8px;margin-bottom:2px">
                <span class="font-semi text-sm">${esc(a.absence_type)}</span>
                <span class="text-xs text-muted">${fmt(a.start_date)} → ${fmt(a.end_date)}</span>
              </div>
              ${a.note ? `<div class="text-sm text-muted">${esc(a.note)}</div>` : ''}
            </div>
          </div>`).join('')}
    </div>

    <div id="tab-documents" class="tab-content">
      ${(emp.documents||[]).length === 0 ? '<div class="text-muted text-sm">Nessun documento caricato</div>' :
        (emp.documents||[]).map(d=>{
          const days = d.expiry_date ? Math.ceil((new Date(d.expiry_date)-new Date())/86400000) : null;
          const statusCls = days===null?'badge-muted':days<0?'badge-bad':days<=30?'badge-warn':'badge-ok';
          return `<div class="timeline-item">
            <div class="timeline-dot" style="background:var(--pri)"></div>
            <div style="flex:1">
              <div style="display:flex;align-items:center;gap:8px">
                <span class="font-semi text-sm">${esc(d.doc_type)}</span>
                ${d.number?`<span class="text-xs text-muted">#${esc(d.number)}</span>`:''}
                ${d.expiry_date?`<span class="badge ${statusCls}" style="font-size:.65rem">${days<0?'Scaduto':days+'gg'}</span>`:''}
              </div>
              <div class="text-xs text-muted">Scadenza: ${fmt(d.expiry_date)} · Rilascio: ${fmt(d.issue_date)}</div>
              ${d.file_path?`<a href="${esc(d.file_path)}?token=${encodeURIComponent(localStorage.getItem('turnidsp_token'))}" target="_blank" class="text-xs text-pri">📎 Visualizza</a>`:''}
            </div>
          </div>`;
        }).join('')}
    </div>

    <div id="tab-disciplinary" class="tab-content">
      ${(emp.disciplinary||[]).map(d=>`
        <div class="timeline-item">
          <div class="timeline-dot" style="background:var(--bad)"></div>
          <div style="flex:1">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:2px">
              <span class="font-semi text-sm">${esc(d.action_type)}</span>
              <span class="badge badge-${d.severity==='high'?'bad':d.severity==='medium'?'warn':'muted'}" style="font-size:.65rem">${esc(d.severity)}</span>
              <span class="text-xs text-muted">${fmt(d.action_date)}</span>
            </div>
            ${d.description?`<div class="text-sm">${esc(d.description)}</div>`:''}
          </div>
        </div>`).join('')||'<div class="text-muted text-sm">Nessun provvedimento aperto</div>'}
    </div>
  `;
}

function switchTab(name) {
  document.querySelectorAll('.profile-tab').forEach((b,i) => {
    const tabs = ['overview','schedule','absences','documents','disciplinary'];
    b.classList.toggle('on', b.getAttribute('onclick') && b.getAttribute('onclick').includes(name));
  });
  document.querySelectorAll('.tab-content').forEach(el => {
    el.classList.toggle('on', el.id === 'tab-' + name);
  });
}

async function toggleStatus(id, newStatus) {
  try {
    await TurniApi.setEmployeeStatus(id, newStatus);
    await loadEmployees();
    openProfile(id);
  } catch(e) { alert(e.message); }
}

function editEmployee(id) {
  // TODO: open a modal or navigate to edit form
  alert('Funzionalità di modifica: apre il pannello di editing per il dipendente #' + id);
}

function openNewEmployee() {
  alert('Aggiungi nuovo dipendente dalla dashboard → Moduli → Dipendenti (o usa Import Excel)');
}

boot();
</script>
</body>
</html>
