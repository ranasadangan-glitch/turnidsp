<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TurniDSP</title>
<!--
  index.html is bootstrap-only. It has no UI of its own: it just decides
  where to send the browser — app.html if a session token is present,
  login.html otherwise. The actual legacy scheduler that used to live
  here has been fully ported into app.html's Workspace section.
-->
<script src="api.js"></script>
<script>
  location.replace((TurniApi.isLoggedIn() && TurniApi.user()) ? 'app.html' : 'login.html');
</script>
</head>
<body>
<p>Caricamento… Se non vieni reindirizzato automaticamente, <a href="login.html">clicca qui</a>.</p>
</body>
</html>
